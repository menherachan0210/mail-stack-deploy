---
- name: Deploy Stalwart, Roundcube, and mail tools
  hosts: mail_servers
  become: true
  gather_facts: true

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - domain is match('^[A-Za-z0-9.-]+$')
          - mail_host is match('^[A-Za-z0-9.-]+$')
          - webmail_host is match('^[A-Za-z0-9.-]+$')
          - admin_email is match('^.+@.+$')
          - web_proxy_mode in ['auto', 'managed', 'external']
          - (local_port_range_start | int) > 1024
          - (local_port_range_end | int) >= (local_port_range_start | int)
        fail_msg: "Please set domain, mail_host, webmail_host, and admin_email in group_vars/all.yml."

    - name: Create local secret directory
      ansible.builtin.file:
        path: "{{ playbook_dir }}/.secrets/{{ inventory_hostname }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: Generate missing secrets locally
      ansible.builtin.set_fact:
        bootstrap_recovery_password_final: "{{ bootstrap_recovery_password | default('', true) | length > 0 | ternary(bootstrap_recovery_password, lookup('password', playbook_dir + '/.secrets/' + inventory_hostname + '/bootstrap_recovery chars=ascii_letters,digits length=24')) }}"
        stalwart_admin_password_final: "{{ stalwart_admin_password | default('', true) | length > 0 | ternary(stalwart_admin_password, lookup('password', playbook_dir + '/.secrets/' + inventory_hostname + '/stalwart_admin chars=ascii_letters,digits length=24')) }}"
        tools_admin_password_final: "{{ tools_admin_password | default('', true) | length > 0 | ternary(tools_admin_password, lookup('password', playbook_dir + '/.secrets/' + inventory_hostname + '/tools_admin chars=ascii_letters,digits length=24')) }}"
        mail_tools_session_secret_final: "{{ mail_tools_session_secret | default('', true) | length > 0 | ternary(mail_tools_session_secret, lookup('password', playbook_dir + '/.secrets/' + inventory_hostname + '/mail_tools_session chars=ascii_letters,digits length=48')) }}"

    - name: Show deployment target
      ansible.builtin.debug:
        msg:
          - "Domain: {{ domain }}"
          - "Mail host: {{ mail_host }}"
          - "Webmail: {{ webmail_host }}"
          - "Stack root: {{ stack_root }}"

  tasks:
    - name: Install common packages on RHEL compatible systems
      ansible.builtin.dnf:
        name:
          - curl
          - ca-certificates
          - tar
          - gzip
          - iproute
          - python3-pip
          - python3-cryptography
          - bind-utils
          - firewalld
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install common packages on Debian compatible systems
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - tar
          - gzip
          - iproute2
          - python3-pip
          - python3-cryptography
          - dnsutils
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Probe public web port ownership
      ansible.builtin.shell: |
        set -euo pipefail
        external=0
        for port in 80 443; do
          listeners="$(ss -ltnp "( sport = :$port )" 2>/dev/null | awk 'NR>1 {print}' || true)"
          if [ -n "$listeners" ] && ! printf '%s\n' "$listeners" | grep -q 'users:(("nginx",'; then
            external=1
          fi
        done
        echo "web_ports_external=$external"
      args:
        executable: /bin/bash
      register: web_port_probe
      changed_when: false

    - name: Set effective web proxy mode
      ansible.builtin.set_fact:
        web_public_ports_need_external: "{{ web_port_probe.stdout is search('web_ports_external=1') }}"
        web_proxy_mode_effective: "{{ 'external' if (web_proxy_mode == 'external' or (web_proxy_mode == 'auto' and (web_port_probe.stdout is search('web_ports_external=1')))) else 'managed' }}"

    - name: Stop when managed web proxy ports are occupied by another service
      ansible.builtin.fail:
        msg: "Ports 80 or 443 are already used by a non-Nginx service. Set web_proxy_mode=auto or web_proxy_mode=external, then connect your existing reverse proxy to the generated local upstreams."
      when:
        - web_proxy_mode == "managed"
        - web_public_ports_need_external | bool

    - name: Show effective web proxy mode
      ansible.builtin.debug:
        msg: "Web proxy mode: {{ web_proxy_mode_effective }}"

    - name: Install Nginx and Certbot on RHEL compatible systems
      ansible.builtin.dnf:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present
      when:
        - ansible_os_family == "RedHat"
        - web_proxy_mode_effective == "managed"

    - name: Install Nginx and Certbot on Debian compatible systems
      ansible.builtin.apt:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present
        update_cache: true
      when:
        - ansible_os_family == "Debian"
        - web_proxy_mode_effective == "managed"

    - name: Install Docker on RHEL compatible systems
      ansible.builtin.dnf:
        name:
          - docker
          - docker-compose-plugin
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install Docker on Debian compatible systems
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Enable Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Check mail protocol port availability before starting services
      ansible.builtin.shell: |
        set -euo pipefail
        stack_owns_port() {
          local container="$1"
          local port="$2"
          docker ps --format '{{ "{{.Names}}" }}' | grep -qx "$container" || return 1
          docker port "$container" 2>/dev/null | grep -Eq ":${port}$"
        }
        for port in {{ port_check_ports | join(' ') }}; do
          if ss -ltn "( sport = :$port )" | awk 'NR>1 {print}' | grep -q .; then
            if stack_owns_port stalwart "$port"; then
              continue
            fi
            echo "Port $port is already listening. Stop the existing service or set skip_port_check=true."
            ss -ltnp "( sport = :$port )" || true
            exit 1
          fi
        done
      args:
        executable: /bin/bash
      changed_when: false
      when: not (skip_port_check | bool)

    - name: Select local reverse-proxy ports
      ansible.builtin.shell: |
        set -euo pipefail

        range_start={{ local_port_range_start | int }}
        range_end={{ local_port_range_end | int }}
        auto_select={{ auto_select_local_ports | bool | ternary('1', '0') }}
        compose_file="{{ stack_root }}/compose.yml"
        chosen_file="$(mktemp)"
        trap 'rm -f "$chosen_file"' EXIT

        port_in_use() {
          ss -ltn "( sport = :$1 )" | awk 'NR>1 {print}' | grep -q .
        }

        stack_owns_port() {
          local container="$1"
          local port="$2"
          docker ps --format '{{ "{{.Names}}" }}' | grep -qx "$container" || return 1
          docker port "$container" 2>/dev/null | grep -Eq ":${port}$"
        }

        existing_port_for() {
          local internal_port="$1"
          [ -f "$compose_file" ] || return 0
          grep -E "127[.]0[.]0[.]1:[0-9]+:${internal_port}($|[\"[:space:]])" "$compose_file" \
            | head -n 1 \
            | sed -E 's/.*127[.]0[.]0[.]1:([0-9]+):.*/\1/' || true
        }

        already_chosen() {
          local candidate="$1"
          grep -qx "$candidate" "$chosen_file"
        }

        remember_port() {
          printf '%s\n' "$1" >> "$chosen_file"
        }

        choose_port() {
          local name="$1"
          local requested="$2"
          local internal_port="$3"
          local container="$4"
          local existing preferred port

          existing="$(existing_port_for "$internal_port")"
          preferred="${existing:-$requested}"

          if [ -n "$existing" ]; then
            if ! port_in_use "$existing" || stack_owns_port "$container" "$existing"; then
              remember_port "$existing"
              printf '%s\n' "$existing"
              return
            fi
          fi

          if ! already_chosen "$preferred" && (! port_in_use "$preferred" || stack_owns_port "$container" "$preferred"); then
            remember_port "$preferred"
            printf '%s\n' "$preferred"
            return
          fi

          if [ "$auto_select" != "1" ]; then
            echo "Local port $preferred for $name is already in use. Enable auto_select_local_ports or choose another port." >&2
            ss -ltnp "( sport = :$preferred )" >&2 || true
            exit 1
          fi

          for port in $(seq "$range_start" "$range_end"); do
            if ! already_chosen "$port" && ! port_in_use "$port"; then
              remember_port "$port"
              printf '%s\n' "$port"
              return
            fi
          done

          echo "No free local port found for $name in range ${range_start}-${range_end}." >&2
          exit 1
        }

        stalwart_http="$(choose_port stalwart_http {{ stalwart_http_port | int }} 8080 stalwart)"
        stalwart_https="$(choose_port stalwart_https {{ stalwart_https_port | int }} 443 stalwart)"
        roundcube_http="$(choose_port roundcube_http {{ roundcube_http_port | int }} 80 roundcube)"
        tools_http="$(choose_port mail_tools {{ tools_port | int }} 8091 mail-tools)"

        printf 'stalwart_http_port_effective: %s\n' "$stalwart_http"
        printf 'stalwart_https_port_effective: %s\n' "$stalwart_https"
        printf 'roundcube_http_port_effective: %s\n' "$roundcube_http"
        printf 'tools_port_effective: %s\n' "$tools_http"
      args:
        executable: /bin/bash
      register: local_port_selection
      changed_when: false

    - name: Store selected local ports
      ansible.builtin.set_fact:
        selected_local_ports: "{{ local_port_selection.stdout | from_yaml }}"

    - name: Apply selected local ports
      ansible.builtin.set_fact:
        stalwart_http_port_effective: "{{ selected_local_ports.stalwart_http_port_effective }}"
        stalwart_https_port_effective: "{{ selected_local_ports.stalwart_https_port_effective }}"
        roundcube_http_port_effective: "{{ selected_local_ports.roundcube_http_port_effective }}"
        tools_port_effective: "{{ selected_local_ports.tools_port_effective }}"

    - name: Show selected local ports
      ansible.builtin.debug:
        msg:
          - "Stalwart HTTP local port: {{ stalwart_http_port_effective }}"
          - "Stalwart HTTPS local port: {{ stalwart_https_port_effective }}"
          - "Roundcube local port: {{ roundcube_http_port_effective }}"
          - "Mail tools local port: {{ tools_port_effective }}"

    - name: Enable Nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started
      when: web_proxy_mode_effective == "managed"

    - name: Open firewall ports when firewalld exists
      ansible.builtin.command: "firewall-cmd --permanent --add-port={{ item }}/tcp"
      loop: "{{ required_ports }}"
      register: firewalld_open
      changed_when: "'success' in firewalld_open.stdout"
      failed_when: false
      when: ansible_os_family == "RedHat"

    - name: Reload firewalld when available
      ansible.builtin.command: firewall-cmd --reload
      changed_when: false
      failed_when: false
      when: ansible_os_family == "RedHat"

    - name: Create stack directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode | default('0755') }}"
      loop:
        - { path: "{{ stack_root }}" }
        - { path: "{{ stack_root }}/mail-tools" }
        - { path: "{{ stack_root }}/scripts" }
        - { path: "{{ stalwart_data_dir }}", mode: "0775" }
        - { path: "{{ stalwart_config_dir }}", mode: "0775" }
        - { path: "{{ roundcube_db_dir }}" }
        - { path: "{{ roundcube_config_dir }}" }

    - name: Check existing stack environment
      ansible.builtin.stat:
        path: "{{ stack_root }}/.env"
      register: existing_stack_env_stat

    - name: Read existing stack environment
      ansible.builtin.slurp:
        path: "{{ stack_root }}/.env"
      register: existing_stack_env
      when: existing_stack_env_stat.stat.exists

    - name: Preserve existing Stalwart admin credentials on redeploy
      ansible.builtin.set_fact:
        existing_stack_env_text: "{{ (existing_stack_env.content | b64decode) if existing_stack_env_stat.stat.exists else '' }}"
        stalwart_admin_user_effective: "{{ ((existing_stack_env.content | b64decode) | regex_search('(?m)^STALWART_ADMIN_USER=(.*)$', '\\1') | first) if (existing_stack_env_stat.stat.exists and ((existing_stack_env.content | b64decode) is search('(?m)^STALWART_ADMIN_USER='))) else 'admin@' ~ domain }}"
        stalwart_admin_password_effective: "{{ ((existing_stack_env.content | b64decode) | regex_search('(?m)^STALWART_ADMIN_PASSWORD=(.*)$', '\\1') | first) if (existing_stack_env_stat.stat.exists and ((existing_stack_env.content | b64decode) is search('(?m)^STALWART_ADMIN_PASSWORD='))) else stalwart_admin_password_final }}"

    - name: Render stack environment
      ansible.builtin.template:
        src: stack.env.j2
        dest: "{{ stack_root }}/.env"
        mode: "0600"

    - name: Upload Docker Compose
      ansible.builtin.template:
        src: compose.yml.j2
        dest: "{{ stack_root }}/compose.yml"
        mode: "0644"

    - name: Upload mail tools source
      ansible.builtin.copy:
        src: files/mail-tools/
        dest: "{{ stack_root }}/mail-tools/"
        mode: preserve
      when: enable_mail_tools | bool

    - name: Upload helper scripts
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ stack_root }}/scripts/{{ item.dest }}"
        mode: "0755"
      loop:
        - { src: bootstrap-stalwart.sh.j2, dest: bootstrap-stalwart.sh }
        - { src: print-dns-records.sh.j2, dest: print-dns-records.sh }
        - { src: healthcheck.sh.j2, dest: healthcheck.sh }

    - name: Print suggested DNS records before DNS check
      ansible.builtin.command: "{{ stack_root }}/scripts/print-dns-records.sh"
      register: suggested_dns_records
      changed_when: false

    - name: Show suggested DNS records
      ansible.builtin.debug:
        msg: "{{ suggested_dns_records.stdout_lines }}"

    - name: Check DNS before requesting certificates
      ansible.builtin.command: "{{ stack_root }}/scripts/print-dns-records.sh --check-only"
      register: dns_check
      changed_when: false
      failed_when: dns_check.rc != 0
      when:
        - request_letsencrypt | bool
        - not (skip_dns_check | bool)

    - name: Start Stalwart for bootstrap
      ansible.builtin.command: docker compose up -d stalwart
      args:
        chdir: "{{ stack_root }}"
      changed_when: true

    - name: Bootstrap Stalwart when config is missing
      ansible.builtin.command: "{{ stack_root }}/scripts/bootstrap-stalwart.sh"
      args:
        chdir: "{{ stack_root }}"
      register: bootstrap_result
      changed_when: "'BOOTSTRAP_CREATED=1' in bootstrap_result.stdout"

    - name: Restart Stalwart after bootstrap
      ansible.builtin.command: docker compose restart stalwart
      args:
        chdir: "{{ stack_root }}"
      changed_when: true
      when: "'BOOTSTRAP_CREATED=1' in bootstrap_result.stdout"

    - name: Start all containers
      ansible.builtin.command: docker compose up -d --build
      args:
        chdir: "{{ stack_root }}"
      changed_when: true

    - name: Render Nginx mail host config
      ansible.builtin.template:
        src: nginx-mail.conf.j2
        dest: "/etc/nginx/conf.d/{{ mail_host }}.conf"
        mode: "0644"
      when: web_proxy_mode_effective == "managed"

    - name: Render Nginx webmail config
      ansible.builtin.template:
        src: nginx-webmail.conf.j2
        dest: "/etc/nginx/conf.d/{{ webmail_host }}.conf"
        mode: "0644"
      when:
        - enable_roundcube | bool
        - web_proxy_mode_effective == "managed"

    - name: Render external reverse proxy upstream notes
      ansible.builtin.template:
        src: external-proxy-upstreams.txt.j2
        dest: "{{ stack_root }}/external-proxy-upstreams.txt"
        mode: "0644"
      when: web_proxy_mode_effective == "external"

    - name: Validate Nginx config
      ansible.builtin.command: nginx -t
      changed_when: false
      when: web_proxy_mode_effective == "managed"

    - name: Reload Nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      when: web_proxy_mode_effective == "managed"

    - name: Request Let's Encrypt certificates
      ansible.builtin.command: >
        certbot --nginx
        -d {{ mail_host }}
        -d {{ webmail_host }}
        --non-interactive
        --agree-tos
        -m {{ admin_email }}
        --redirect
        {{ force_renew_certificates | bool | ternary('--force-renewal', '') }}
      register: certbot_result
      changed_when: "'Congratulations' in certbot_result.stdout or 'Successfully' in certbot_result.stdout"
      when:
        - request_letsencrypt | bool
        - web_proxy_mode_effective == "managed"

    - name: Show external reverse proxy note
      ansible.builtin.debug:
        msg:
          - "External reverse proxy mode is active. Configure your existing proxy with {{ stack_root }}/external-proxy-upstreams.txt."
          - "This playbook did not request Let's Encrypt certificates because ports 80/443 are owned outside this stack."
      when: web_proxy_mode_effective == "external"

    - name: Run health checks
      ansible.builtin.command: "{{ stack_root }}/scripts/healthcheck.sh"
      register: healthcheck_result
      changed_when: false

    - name: Print DNS records
      ansible.builtin.command: "{{ stack_root }}/scripts/print-dns-records.sh"
      register: dns_records_result
      changed_when: false

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Stalwart admin: https://{{ mail_host }}/admin/"
          - "Roundcube: https://{{ webmail_host }}/"
          - "Mail tools: https://{{ mail_host }}{{ tools_base_path }}/"
          - "Web proxy mode: {{ web_proxy_mode_effective }}"
          - "Credentials file on server: {{ stack_root }}/credentials.txt"
          - "DNS record file on server: {{ stack_root }}/dns-records.txt"
