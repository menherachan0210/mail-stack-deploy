---
- name: Restart mail stack
  hosts: mail_servers
  become: true
  gather_facts: false
  tasks:
    - name: Restart containers
      ansible.builtin.command: docker compose restart
      args:
        chdir: "{{ stack_root | default('/opt/mail-stack') }}"
      changed_when: true

    - name: Collect service facts
      ansible.builtin.service_facts:

    - name: Reload Nginx when available
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      when: "'nginx.service' in ansible_facts.services"
